# HeartBits — standalone deployment
# Self-contained: Caddy, Zitadel, Postgres, Redis, MinIO, API, relay, web.
# To deploy: cp .env.example .env && fill in secrets && docker compose up -d
# First run: ./bootstrap.sh   (sets up Zitadel OIDC app, needs browser approval)

services:

  # ── Edge proxy: TLS termination + routing ──────────────────────────────────
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      ACME_EMAIL:    ${ACME_EMAIL}
      APP_DOMAIN:    ${APP_DOMAIN}
      AUTH_DOMAIN:   ${AUTH_DOMAIN}
      RELAY_DOMAIN:  ${RELAY_DOMAIN}
      API_DOMAIN:    ${API_DOMAIN:-}
      STATUS_DOMAIN: ${STATUS_DOMAIN:-}
    networks:
      public:
      internal:
        # auth domain alias on Caddy so internal services reach Zitadel via HTTPS
        aliases:
          - ${AUTH_DOMAIN}
    restart: unless-stopped

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       heartbits
      POSTGRES_USER:     heartbits
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heartbits -d heartbits"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── MinIO media storage ────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_USER:-heartbits}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      # Public URL used when generating presigned URLs (must match Caddy vhost)
      MINIO_SERVER_URL:    https://${MEDIA_DOMAIN}
    volumes:
      - minio_data:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Zitadel OIDC ──────────────────────────────────────────────────────────
  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.14.0
    command: start-from-init --masterkeyFromEnv --tlsMode disabled
    environment:
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY}
      ZITADEL_DATABASE_POSTGRES_HOST:                postgres
      ZITADEL_DATABASE_POSTGRES_PORT:                5432
      ZITADEL_DATABASE_POSTGRES_DATABASE:            zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME:       heartbits
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD:       ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE:       disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME:      heartbits
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD:      ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE:      disable
      ZITADEL_EXTERNALSECURE:                        "true"
      ZITADEL_EXTERNALPORT:                          443
      ZITADEL_EXTERNALDOMAIN:                        ${AUTH_DOMAIN}
      ZITADEL_PORT:                                  "8180"
      ZITADEL_HTTP_INSTANCE_ENABLED_TRUSTED_PROXY_IPS: 172.16.0.0/12,10.0.0.0/8,192.168.0.0/16
      ZITADEL_FIRSTINSTANCE_ORG_NAME:                                  HeartBits
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME:                        admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD:                        ${ZITADEL_ADMIN_PASSWORD}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED:          "false"
      # bootstrap-admin: IAM_OWNER machine user — PAT used by bootstrap.sh to call management API
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME:              bootstrap-admin
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME:                  Bootstrap Admin
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE:            "2099-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_PATPATH:                                   /zitadel/bootstrap/admin.pat
      # login-client: IAM_LOGIN_CLIENT machine user — PAT used by the login UI container
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH:                        /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME:          login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME:              Login Client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE:        "2099-01-01T00:00:00Z"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED:               "true"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI:                https://${AUTH_DOMAIN}/ui/v2/login/
      ZITADEL_OIDC_DEFAULTLOGINURLV2:                                  https://${AUTH_DOMAIN}/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2:                                 https://${AUTH_DOMAIN}/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2:                                  https://${AUTH_DOMAIN}/ui/v2/login/login?samlRequest=
    volumes:
      - ./zitadel/bootstrap:/zitadel/bootstrap
      - ./zitadel/ready.yaml:/etc/zitadel/ready.yaml:ro
    networks: [internal]
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  # ── Zitadel login UI ──────────────────────────────────────────────────────
  login:
    image: ghcr.io/zitadel/zitadel-login:v4.14.0
    environment:
      # Public HTTPS URL — login app uses this for both server-side calls and browser asset URLs
      ZITADEL_API_URL:                 https://${AUTH_DOMAIN}
      NEXT_PUBLIC_BASE_PATH:           /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
    volumes:
      - ./zitadel/bootstrap:/zitadel/bootstrap:ro
      # Patched locale files — replaces "Zitadel" with "HeartBits" in UI text
      - ./zitadel/login-patch/en-chunks.js:/app/apps/login/.next/server/chunks/apps_login_locales_en_json_[json]_cjs_12cw_mw._.js:ro
      - ./zitadel/login-patch/en-ssr.js:/app/apps/login/.next/server/chunks/ssr/apps_login_locales_en_json_[json]_cjs_01zbe4u._.js:ro
      # Patched i18n config — stubs out getHostedLoginTranslation so locale patches aren't overridden
      - ./zitadel/login-patch/i18n-config.js:/app/apps/login/.next/server/chunks/ssr/_0f_prw6._.js:ro
    networks: [internal]
    depends_on:
      zitadel: { condition: service_started }
    restart: unless-stopped

  # ── HeartBits API ─────────────────────────────────────────────────────────
  heartbits-api:
    image: oven/bun:1-alpine
    working_dir: /app
    volumes:
      - ../heartbits-api:/app
      - heartbits-api-modules:/app/node_modules
    command: sh -c "bun install --frozen-lockfile && bun run src/index.ts"
    environment:
      DATABASE_URL:           postgres://heartbits:${POSTGRES_PASSWORD}@postgres:5432/heartbits
      REDIS_URL:              redis://redis:6379
      ZITADEL_ISSUER:         https://${AUTH_DOMAIN}
      ZITADEL_JWKS_URL:       https://${AUTH_DOMAIN}/.well-known/openid-configuration
      ZITADEL_CLIENT_ID:      ${HEARTBITS_CLIENT_ID}
      HB_FIELD_ENCRYPTION_KEY: ${HB_FIELD_ENCRYPTION_KEY}
      RELAY_DOMAIN:           ${RELAY_DOMAIN}
      MINIO_ENDPOINT:         minio:9000
      MINIO_BUCKET:           heartbits-media
      MINIO_ACCESS_KEY:       ${MINIO_USER:-heartbits}
      MINIO_SECRET_KEY:       ${MINIO_PASSWORD}
      MEDIA_DOMAIN:           ${MEDIA_DOMAIN}
      PORT:                   "3100"
    networks: [internal]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      zitadel:  { condition: service_started }
    restart: unless-stopped

  # ── HeartBits background worker ──────────────────────────────────────────
  heartbits-worker:
    image: oven/bun:1-alpine
    working_dir: /app
    volumes:
      - ../heartbits-api:/app
      - heartbits-api-modules:/app/node_modules
    command: sh -c "bun install --frozen-lockfile && bun run src/worker.ts"
    environment:
      DATABASE_URL:            postgres://heartbits:${POSTGRES_PASSWORD}@postgres:5432/heartbits
      WORKER_DATABASE_URL:     postgres://heartbits_worker:${WORKER_POSTGRES_PASSWORD}@postgres:5432/heartbits
      REDIS_URL:               redis://redis:6379
      HB_FIELD_ENCRYPTION_KEY: ${HB_FIELD_ENCRYPTION_KEY}
      MINIO_ENDPOINT:          minio:9000
      MINIO_ACCESS_KEY:        ${MINIO_USER:-heartbits}
      MINIO_SECRET_KEY:        ${MINIO_PASSWORD}
    networks: [internal]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    restart: unless-stopped

  # ── HeartBits WebSocket relay ─────────────────────────────────────────────
  heartbits-relay:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ../relay-server:/app
      - heartbits-relay-modules:/app/node_modules
    command: sh -c "npm ci --omit=dev && node server.js"
    environment:
      ROOM_TOKEN:       ${ROOM_TOKEN}
      REDIS_URL:        redis://redis:6379
      ZITADEL_JWKS_URL: https://${AUTH_DOMAIN}/.well-known/openid-configuration
    networks: [internal]
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped

  # ── HeartBits web app ─────────────────────────────────────────────────────
  heartbits-web:
    image: oven/bun:1-alpine
    working_dir: /app
    volumes:
      - ../heartbits-web:/app
      - heartbits-web-modules:/app/node_modules
    command: sh -c "bun install --frozen-lockfile && bun run build/index.js"
    environment:
      PORT:                     "3000"
      ORIGIN:                   https://${APP_DOMAIN}
      PUBLIC_ZITADEL_ISSUER:    https://${AUTH_DOMAIN}
      PUBLIC_ZITADEL_CLIENT_ID: ${HEARTBITS_CLIENT_ID}
      ZITADEL_CLIENT_SECRET:    ${HEARTBITS_CLIENT_SECRET:-}
      SESSION_SECRET:           ${SESSION_SECRET}
      STAGING_PASSWORD:         ${STAGING_PASSWORD:-}
      PUBLIC_API_BASE:          https://${APP_DOMAIN}/api
      API_BASE_INTERNAL:        http://heartbits-api:3100
      MONITOR_URL:              http://heartbits-monitor:4000
      WEB_URL:                  https://${APP_DOMAIN}
      AUTH_URL:                 https://${AUTH_DOMAIN}/debug/healthz
      RELAY_URL:                https://${RELAY_DOMAIN}
    networks: [internal]
    restart: unless-stopped

  # ── Uptime monitor ─────────────────────────────────────────────────────────
  heartbits-monitor:
    image: oven/bun:1-alpine
    working_dir: /app
    volumes:
      - ../heartbits-monitor:/app:ro
      - monitor_data:/data
    command: bun run monitor.ts
    environment:
      PORT:      "4000"
      DB_PATH:   /data/heartbits.db
      INTERVAL:  "60000"
      # Internal Docker service URLs — avoids hairpin NAT
      WEB_URL:      http://heartbits-web:3000
      AUTH_URL:     http://zitadel:8180/debug/healthz
      RELAY_URL:    http://heartbits-relay:8765
      API_URL:      http://heartbits-api:3100/health
      # Public domain names — used for display on the status page
      APP_DOMAIN:   ${APP_DOMAIN}
      AUTH_DOMAIN:  ${AUTH_DOMAIN}
      RELAY_DOMAIN: ${RELAY_DOMAIN}
      API_DOMAIN:   ${API_DOMAIN:-}
    networks: [internal]
    restart: unless-stopped

networks:
  public:
  internal:

volumes:
  pg_data:
  caddy_data:
  caddy_config:
  minio_data:
  monitor_data:
  heartbits-api-modules:
  heartbits-relay-modules:
  heartbits-web-modules:
