name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          # Kotlin can't be analysed in build-mode "none" — it needs a real
          # build. We compile the Android app manually below. (Swift would
          # likewise need a macOS + Xcode build; deferred until mobile matures.)
          - language: java-kotlin
            build-mode: manual
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Manual build for Kotlin. The Android SDK is preinstalled on the runner
      # (ANDROID_HOME); local.properties is gitignored but the gradle script
      # reads it with defaults, so its absence is fine.
      - name: Build Android app (for CodeQL)
        if: matrix.build-mode == 'manual'
        working-directory: HeartbitsAndroid
        run: ./gradlew :app:assembleDebug --no-daemon --console=plain

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
