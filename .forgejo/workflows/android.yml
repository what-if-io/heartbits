name: Android Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'HeartbitsAndroid/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: HeartbitsAndroid
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: HeartbitsAndroid
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: heartbits-debug
          path: HeartbitsAndroid/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
