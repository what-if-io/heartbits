# forgejo-runner config example
# Generate a fresh one with: forgejo-runner generate-config > ~/.forgejo-runner.yaml
# Then replace the connections section at the bottom with the block below.
#
# UUID + token come from Forgejo UI:
#   Admin panel → Actions → Runners → Create new runner
#
# IMPORTANT: labels must use the `label:host` format for native execution.
# A plain label (no :host) defaults to Docker and will fail on machines
# where Docker isn't set up for CI use.

log:
  level: info
  job_level: info

runner:
  capacity: 1
  env_file: .env
  timeout: 3h
  shutdown_timeout: 3h
  insecure: false
  fetch_timeout: 30s
  fetch_interval: 2s
  report_interval: 1s
  labels: []

cache:
  enabled: true
  port: 0
  dir: ""
  external_server: ""
  secret: ""
  secret_url: ""
  host: ""
  proxy_port: 0
  actions_cache_url_override: ""

container:
  network: ""
  enable_ipv6: false
  privileged: false
  options:
  workdir_parent:
  valid_volumes: []
  docker_host: "-"
  force_pull: false
  force_rebuild: false

host:
  workdir_parent:

server:
  connections:

    # ── macOS runner (Xcode builds) ───────────────────────────────────────────
    # token stored in a separate file — never commit the real token
    heartbits-ci:
      url: http://192.168.1.12:3000        # use IP, not ci.local (mDNS fails in LaunchAgent)
      uuid: PASTE-UUID-FROM-FORGEJO-UI
      token_url: file:///Users/laztoum/Projects/ci-token
      labels:
        - macos:host
        - macos-latest:host
        - self-hosted:host

    # ── Linux runner (relay server / Android CI) ──────────────────────────────
    # Uncomment and fill in for the Fedora machine:
    #
    # heartbits-ci-linux:
    #   url: http://localhost:3000
    #   uuid: PASTE-UUID-FROM-FORGEJO-UI
    #   token_url: file:///home/git/runner-token
    #   labels:
    #     - linux:host
    #     - ubuntu-latest:host
    #     - fedora:host

    # ── Windows runner (desktop app builds) ───────────────────────────────────
    # Pre-built binary available — no need to build from source:
    #   https://code.forgejo.org/forgejo/runner/releases → forgejo-runner-x.x.x-windows-amd64.exe
    # Run as a Windows Service via NSSM: https://nssm.cc
    # Add `shell: bash` to workflow steps or use PowerShell syntax.
    #
    # heartbits-ci-windows:
    #   url: http://192.168.1.12:3000
    #   uuid: PASTE-UUID-FROM-FORGEJO-UI
    #   token_url: file://C:/Users/YOU/ci-token.txt
    #   labels:
    #     - windows:host
    #     - windows-latest:host
    #     - self-hosted:host
