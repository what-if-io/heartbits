<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Theme -->
    <meta name="theme-color" content="#FF6B6B" />
    <meta name="color-scheme" content="dark" />

    <!-- SEO base (pages override via svelte:head) -->
    <meta name="description" content="HeartBits — the dating app that puts your heart first. Share your real heartbeat with your matches. No swipes, just biology." />
    <meta name="keywords" content="dating app, heartbeat, biometric, real connection, matches" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="HeartBits" />
    <meta property="og:title" content="HeartBits — Feel the connection." />
    <meta property="og:description" content="The dating app that puts your heart first. Literally. Share your real-time heartbeat with your matches." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://heartbits.what-if.io/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HeartBits — Feel the connection." />
    <meta name="twitter:description" content="The dating app that puts your heart first. Literally." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- PWA / mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HeartBits" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Fonts preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />

    <!-- Inline critical style: prevents flash of white background -->
    <style>
      html, body { background: #070710; }
    </style>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
